<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suit Patiala Shahi</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #6d214f, #b33771);
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .container {
        padding: 40px;
        max-width: 600px;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 15px;
        letter-spacing: 2px;
      }

      h2 {
        font-size: 2rem;
        margin-bottom: 25px;
        color: #ffeaa7;
      }

      p {
        font-size: 1.1rem;
        margin-bottom: 30px;
      }

      .btn {
        display: inline-block;
        background: #25d366;
        color: white;
        padding: 15px 35px;
        text-decoration: none;
        border-radius: 50px;
        font-size: 18px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn:hover {
        background: #1da851;
        transform: scale(1.05);
      }

      footer {
        margin-top: 35px;
        font-size: 14px;
        color: #f1f1f1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Suit Patiala Shahi</h1>
      <h2>✨ Coming Soon ✨</h2>

      <p>
        We're working on something beautiful for you.
        <br /><br />
        Till then, connect with us on WhatsApp.
      </p>

      <!-- Replace the number below with your WhatsApp number -->
      <a href="https://wa.me/91XXXXXXXXXX" class="btn" target="_blank">
        💬 Connect on WhatsApp
      </a>

      <footer>© 2026 Suit Patiala Shahi</footer>
    </div>
  </body>
</html>
