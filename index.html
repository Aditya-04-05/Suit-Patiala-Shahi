<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suit Patiala Shahi</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #f2d1b2;
      overflow: hidden;

      background:
        linear-gradient(rgba(0,0,0,0.90), rgba(0,0,0,0.90)),
        url("logo.jpg") center center / 650px no-repeat,
        #000;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 40px;
    }

    .logo {
      width: 170px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 4rem;
      color: #e8b995;
      margin-bottom: 15px;
      font-weight: 700;
    }

    h2 {
      font-size: 2.2rem;
      color: #d4a373;
      margin-bottom: 35px;
      font-weight: 400;
    }

    p {
      font-size: 1.3rem;
      line-height: 1.8;
      margin-bottom: 45px;
      color: #f2d1b2;
    }

    .btn {
      display: inline-block;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      padding: 18px 40px;
      border-radius: 50px;
      font-size: 20px;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 8px 30px rgba(37,211,102,.35);
    }

    .btn:hover {
      background: #1EBE5D;
      transform: scale(1.05);
      box-shadow: 0 12px 35px rgba(37,211,102,.5);
    }

    footer {
      margin-top: 50px;
      color: #b98d68;
      font-size: 15px;
    }

    @media (max-width: 768px) {

      body {
        background:
          linear-gradient(rgba(0,0,0,.92), rgba(0,0,0,.92)),
          url("logo.jpg") center center / 300px no-repeat,
          #000;
      }

      .logo {
        width: 120px;
      }

      h1 {
        font-size: 2.4rem;
      }

      h2 {
        font-size: 1.6rem;
      }

      p {
        font-size: 1.05rem;
      }

      .btn {
        padding: 15px 30px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.jpg" class="logo" alt="Suit Patiala Shahi">

    <h1>Suit Patiala Shahi</h1>

    <h2>✨ Coming Soon ✨</h2>

    <p>
      We're crafting something beautiful for you.<br><br>
      Until then, connect with us on WhatsApp.
    </p>

    <a href="https://wa.me/919056712386" class="btn" target="_blank">
      💬 Connect on WhatsApp
    </a>

    <footer>
      © 2026 Suit Patiala Shahi. All Rights Reserved.
    </footer>

  </div>

</body>
</html>
